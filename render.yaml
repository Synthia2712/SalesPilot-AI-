services:
  - type: web
    name: salespilot-ai

    runtime: python

    buildCommand: pip install -r requirements.txt

    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: OPENROUTER_API_KEY
        sync: false

      - key: TAVILY_API_KEY
        sync: false

      - key: OPENROUTER_MODEL
        value: google/gemini-2.5-pro